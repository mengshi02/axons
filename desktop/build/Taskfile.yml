version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  generate:icons:
    summary: Generates Mac .icns and Windows .ico from appicon.png
    dir: build
    sources:
      - appicon.png
    generates:
      - darwin/icons.icns
      - windows/icon.ico
    cmds:
      - '{{.WAILS3}} generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico'

  install:frontend:deps:
    summary: Install frontend dependencies
    dir: ../ui
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/*
    preconditions:
      - sh: npm --version
    cmds:
      - npm install

  build:frontend:
    label: build:frontend (PRODUCTION={{.PRODUCTION}})
    summary: Build the frontend project
    dir: ../ui
    sources:
      - "**/*"
      - exclude: node_modules/**/*
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
    cmds:
      - npm run build -q
    env:
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  dev:frontend:
    summary: Runs the frontend in development mode
    dir: ../ui
    deps:
      - task: install:frontend:deps
    cmds:
      - npm run dev