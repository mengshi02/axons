version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  sign:
    summary: Signs the Windows executable with Authenticode signature
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - |
        if [ -z "{{.SIGN_CERT}}" ] || [ -z "{{.SIGN_KEY}}" ]; then
          echo "⚠️  Code signing certificate not configured."
          echo "   Set SIGN_CERT (PFX path) and SIGN_KEY (password) to enable signing."
          echo "   Example: SIGN_CERT=./cert.pfx SIGN_KEY=secret task sign"
          echo ""
          echo "   Skipping code signing — Windows SmartScreen may flag this executable."
        else
          echo "🔐 Signing {{.BIN_DIR}}/{{.APP_NAME}}.exe..."
          signtool sign /f "{{.SIGN_CERT}}" /p "{{.SIGN_KEY}}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
          echo "✅ Code signing complete."
        fi
    vars:
      SIGN_CERT: '{{.SIGN_CERT | default ""}}'
      SIGN_KEY: '{{.SIGN_KEY | default ""}}'

  build:
    summary: Builds the application for Windows
    deps:
      - task: common:go:mod:tidy
      - task: common:generate:icons
    cmds:
      - task: generate:syso
      - go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}.exe
      - cmd: powershell Remove-item *.syso
        platforms: [windows]
      - cmd: rm -f *.syso
        platforms: [linux, darwin]
    vars:
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{else}}-buildvcs=false -gcflags=all="-l"{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: 0
      GOARCH: '{{.ARCH | default ARCH}}'
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  package:
    summary: Packages a production build of the application
    cmds:
      - task: create:nsis:installer

  generate:syso:
    summary: Generates Windows `.syso` resource file
    dir: build
    cmds:
      - '{{.WAILS3}} generate syso -arch {{.ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso'
    vars:
      ARCH: '{{.ARCH | default ARCH}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - ./build/create-windows-installer.sh

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'