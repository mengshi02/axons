version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for Linux
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}}
    vars:
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{else}}-buildvcs=false -gcflags=all="-l"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  package:
    summary: Packages a production build of the application
    cmds:
      - task: create:appimage

  create:appimage:
    summary: Creates an AppImage for Linux
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/bin
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/share/applications
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/share/icons/hicolor/256x256/apps
      - cp {{.BIN_DIR}}/{{.APP_NAME}} {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/bin/
      - cp build/linux/axons.desktop {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/share/applications/
      - cp build/appicon.png {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/usr/share/icons/hicolor/256x256/apps/axons.png
      - cp build/linux/AppRun {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/
      - chmod +x {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/AppRun
      - cp build/linux/axons.desktop {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/
      - cp build/appicon.png {{.BIN_DIR}}/{{.APP_NAME}}.AppDir/
      - cd {{.BIN_DIR}} && python3 -m appimage {{.APP_NAME}}.AppDir || echo "AppImage creation requires appimage-tools. Binary is available at {{.BIN_DIR}}/{{.APP_NAME}}"

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'