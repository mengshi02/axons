version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      disable:
        - printf

    staticcheck:
      checks:
        - all
        - '-QF1003'  # tagged switch - style suggestion, not a bug
        - '-QF1012'  # fmt.Fprintf instead of WriteString(Sprintf) - style suggestion
        - '-S1017'   # TrimPrefix suggestion - style suggestion
        - '-S1002'   # omit bool comparison - style suggestion
        - '-S1005'   # unnecessary blank identifier assignment - minor
        - '-SA9003'  # empty branch - sometimes intentional for documentation
        - '-SA1019'  # deprecated function usage - informational, not always actionable
        - '-SA4006'  # value never used after assignment - minor
        - '-SA4000'  # identical expressions - minor logic check
        - '-S1039'   # unnecessary Sprintf - style suggestion

issues:
  max-issues-per-linter: 50
  max-same-issues: 10