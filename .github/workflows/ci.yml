name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Build
        run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build all platforms
        run: make dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release, build-desktop-mac, build-desktop-windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download macOS desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: axons-macos
          path: desktop-macos/

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: axons-windows
          path: desktop-windows/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            desktop-macos/*
            desktop-windows/*
          generate_release_notes: true

  build-desktop-mac:
    name: Build macOS Desktop App
    runs-on: macos-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build macOS DMG
        run: cd desktop && make build-mac-dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axons-macos
          path: |
            desktop/build/bin/*.dmg
            desktop/build/bin/*.app

  build-desktop-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Windows executable
        run: cd desktop && make build-windows

      - name: Sign Windows executable
        if: env.SIGN_CERT_BASE64 != ''
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          SIGN_KEY: ${{ secrets.WINDOWS_SIGN_KEY }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "sign-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:SIGN_CERT_BASE64))
          signtool sign /f $certPath /p $env:SIGN_KEY /tr http://timestamp.digicert.com /td sha256 /fd sha256 desktop/bin/axons.exe
          Remove-Item $certPath
          echo "✅ Code signing complete."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axions-windows
          path: desktop/build/bin/*.exe